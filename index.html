<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS Admin Dashboard | Rare Grade Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // TODO: Replace with your project's Firebase configuration
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- REAL-TIME DATA FETCHING ---
        
        // 1. Fetch Stats
        const statsRef = ref(db, 'stats');
        onValue(statsRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('total-students').innerText = data.activeStudents.toLocaleString();
                document.getElementById('total-revenue').innerText = formatCurrency(data.totalRevenue);
                document.getElementById('completion-rate').innerText = data.completionRate + "%";
            }
        });

        // 2. Fetch Recent Enrollments
        const enrollRef = ref(db, 'enrollments');
        onValue(enrollRef, (snapshot) => {
            const tableBody = document.getElementById('enrollment-table-body');
            tableBody.innerHTML = ''; // Clear mockup
            snapshot.forEach((childSnapshot) => {
                const item = childSnapshot.val();
                const row = `
                    <tr class="hover:bg-gray-50 transition border-b border-gray-100">
                        <td class="px-6 py-4 font-medium text-gray-700">${item.studentName}</td>
                        <td class="px-6 py-4 text-gray-600">${item.courseName}</td>
                        <td class="px-6 py-4 text-gray-500">${new Date(item.timestamp).toLocaleDateString()}</td>
                        <td class="px-6 py-4"><span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-medium">${item.status}</span></td>
                    </tr>`;
                tableBody.insertAdjacentHTML('afterbegin', row);
            });
        });

        window.db = db; // Expose for functions
    </script>
    
    <!-- Cloudinary Widget -->
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 h-screen sticky top-0 text-white hidden md:flex flex-col">
        <div class="p-6">
            <h1 class="text-2xl font-bold tracking-tight text-indigo-400">Rare Grade LMS</h1>
        </div>
        <nav class="flex-1 px-4 space-y-2 mt-4">
            <a href="#" class="flex items-center space-x-3 bg-indigo-600 p-3 rounded-lg text-white"><span>🏠</span> <span>Dashboard</span></a>
            <a href="#" class="flex items-center space-x-3 p-3 rounded-lg text-gray-400 hover:bg-slate-800 transition"><span>📚</span> <span>Courses</span></a>
            <a href="#" class="flex items-center space-x-3 p-3 rounded-lg text-gray-400 hover:bg-slate-800 transition"><span>👥</span> <span>Students</span></a>
            <a href="#" class="flex items-center space-x-3 p-3 rounded-lg text-gray-400 hover:bg-slate-800 transition"><span>💰</span> <span>Revenue</span></a>
        </nav>
        <div class="p-6 border-t border-slate-800">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 rounded-full bg-indigo-500 flex items-center justify-center font-bold">K</div>
                <div>
                    <p class="text-sm font-medium">Katlego</p>
                    <p class="text-xs text-gray-500">Super Admin</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 min-h-screen p-8">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-2xl font-bold text-gray-800">Live Platform Monitor</h2>
                <p class="text-gray-500">Syncing real-time data from Firebase.</p>
            </div>
            <button onclick="openUploadWidget()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-indigo-700 transition shadow-lg shadow-indigo-200">
                + Upload New Course
            </button>
        </header>

        <!-- KPI Stats -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-gray-500 text-sm font-medium uppercase">Active Students</p>
                <h3 id="total-students" class="text-3xl font-bold mt-2">...</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-gray-500 text-sm font-medium uppercase">Total Revenue (ZAR)</p>
                <h3 id="total-revenue" class="text-3xl font-bold mt-2 text-indigo-600">...</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-gray-500 text-sm font-medium uppercase">Avg Completion</p>
                <h3 id="completion-rate" class="text-3xl font-bold mt-2">...</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-gray-500 text-sm font-medium uppercase">Server Status</p>
                <h3 class="text-3xl font-bold mt-2 text-green-500">Online</h3>
            </div>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                <h4 class="font-bold text-gray-800">Real-time Enrollments</h4>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-gray-400 text-xs uppercase font-medium">
                        <tr>
                            <th class="px-6 py-4">Student</th>
                            <th class="px-6 py-4">Course</th>
                            <th class="px-6 py-4">Date</th>
                            <th class="px-6 py-4">Status</th>
                        </tr>
                    </thead>
                    <tbody id="enrollment-table-body">
                        <!-- Data injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // Currency Formatter for Rands
        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-ZA', {
                style: 'currency',
                currency: 'ZAR',
            }).format(amount);
        }

        // Cloudinary Upload Logic
        function openUploadWidget() {
            cloudinary.openUploadWidget({
                cloudName: "YOUR_CLOUD_NAME", 
                uploadPreset: "YOUR_PRESET", // Ensure this is "Unsigned" in Cloudinary settings
                sources: ['local', 'url', 'camera'],
                showAdvancedOptions: false,
                cropping: true,
                multiple: false,
                defaultSource: "local"
            }, (error, result) => {
                if (!error && result && result.event === "success") { 
                    console.log('Done! Here is the image info: ', result.info);
                    saveCourseToFirebase(result.info.secure_url, result.info.original_filename);
                }
            });
        }

        // Save Course Data to Firebase after Cloudinary Upload
        function saveCourseToFirebase(url, fileName) {
            const coursesRef = window.db ? import("https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js").then(m => {
                const newCourseRef = m.push(m.ref(window.db, 'courses'));
                m.set(newCourseRef, {
                    title: fileName,
                    thumbnail: url,
                    price: 499, // Default R499
                    currency: "ZAR",
                    createdAt: Date.now()
                });
                alert('Course thumbnail saved to Firebase!');
            }) : null;
        }
    </script>
</body>
</html>
