<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rare Grade LMS | Admin Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .hidden-section { display: none; }
        .sidebar-transition { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        #global-loader {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            z-index: 9999;
        }

        .loader {
            border-top-color: #4f46e5;
            animation: spinner 0.6s linear infinite;
        }
        @keyframes spinner { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }

        .nav-btn.active {
            background: #4f46e5;
            color: white;
            box-shadow: 0 4px 12px -2px rgba(79, 70, 229, 0.3);
        }
    </style>
</head>
<body class="bg-[#f8fafc] flex min-h-screen text-slate-800">

    <div id="global-loader" class="fixed inset-0 hidden items-center justify-center flex-col">
        <div class="loader rounded-full border-4 border-slate-200 h-12 w-12 mb-3"></div>
        <p id="loader-text" class="text-indigo-600 font-bold text-sm tracking-tight">Syncing Database...</p>
    </div>

    <aside id="sidebar" class="sidebar-transition group w-16 hover:w-64 bg-slate-950 h-screen fixed left-0 top-0 text-white flex flex-col z-50 overflow-hidden">
        <div class="p-4 mb-4 flex items-center gap-x-3">
            <div class="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center flex-shrink-0">
                <i data-lucide="layers" class="w-5 h-5 text-white"></i>
            </div>
            <span class="font-bold text-lg opacity-0 group-hover:opacity-100 transition-opacity">Rare Grade</span>
        </div>

        <nav class="flex-1 px-2 space-y-1">
            <button onclick="nav('dashboard')" id="nav-dashboard" class="nav-btn active w-full flex items-center gap-x-4 px-3 py-3 rounded-xl transition-all">
                <i data-lucide="layout-dashboard" class="w-5 h-5 flex-shrink-0"></i>
                <span class="opacity-0 group-hover:opacity-100 font-medium text-sm">Dashboard</span>
            </button>
            <button onclick="nav('teachers')" id="nav-teachers" class="nav-btn w-full flex items-center gap-x-4 px-3 py-3 rounded-xl text-slate-400 hover:bg-slate-900 transition-all">
                <i data-lucide="graduation-cap" class="w-5 h-5 flex-shrink-0"></i>
                <span class="opacity-0 group-hover:opacity-100 font-medium text-sm">Teachers</span>
            </button>
            <button onclick="nav('learners')" id="nav-learners" class="nav-btn w-full flex items-center gap-x-4 px-3 py-3 rounded-xl text-slate-400 hover:bg-slate-900 transition-all">
                <i data-lucide="users" class="w-5 h-5 flex-shrink-0"></i>
                <span class="opacity-0 group-hover:opacity-100 font-medium text-sm">Learners</span>
            </button>
        </nav>
    </aside>

    <main class="flex-1 ml-16">
        <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 px-6 py-4 flex items-center justify-between sticky top-0 z-40">
            <h1 id="page-title" class="text-xl font-bold text-slate-900">Dashboard</h1>
            <div id="local-clock" class="text-[11px] font-bold text-slate-400 uppercase">Pretoria, ZA</div>
        </header>

        <div class="p-6 max-w-[1600px] mx-auto">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1">Total Learners</p>
                    <h3 id="stat-learners" class="text-2xl font-bold">0</h3>
                </div>
                <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                    <p class="text-violet-400 text-[10px] font-bold uppercase tracking-widest mb-1">Total Teachers</p>
                    <h3 id="stat-teachers" class="text-2xl font-bold text-violet-600">0</h3>
                </div>
                <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                    <p class="text-emerald-400 text-[10px] font-bold uppercase tracking-widest mb-1">Total Revenue</p>
                    <h3 id="stat-revenue" class="text-2xl font-bold text-emerald-600">R 0</h3>
                </div>
            </div>

            <section id="section-teachers" class="hidden-section">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold">Teacher Registry</h2>
                    <button onclick="toggleModal('teacher', true)" class="bg-violet-600 text-white px-4 py-2 rounded-xl text-sm font-bold">Add Teacher</button>
                </div>
                <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-[10px] uppercase tracking-widest font-bold text-slate-400">
                            <tr>
                                <th class="px-6 py-4">Instructor Name</th>
                                <th class="px-6 py-4">Specialization</th>
                                <th class="px-6 py-4">Email</th>
                                <th class="px-6 py-4 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="teacher-table-body" class="divide-y divide-slate-50 text-sm">
                            </tbody>
                    </table>
                </div>
            </section>

            <section id="section-dashboard">
                <div class="bg-white rounded-2xl border border-slate-100 p-6 shadow-sm">
                    <h3 class="font-bold text-sm mb-4">Financial Summary</h3>
                    <div class="h-32 flex items-end gap-2">
                        <div class="bg-emerald-100 w-full rounded-t-lg" style="height: 40%"></div>
                        <div class="bg-emerald-200 w-full rounded-t-lg" style="height: 65%"></div>
                        <div class="bg-emerald-500 w-full rounded-t-lg" style="height: 100%"></div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <div id="modal-container" class="fixed inset-0 hidden items-center justify-center bg-slate-950/40 backdrop-blur-sm z-[100] p-4">
        <div id="modal-teacher" class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-6">
            <h3 class="text-lg font-bold mb-4">Add New Teacher</h3>
            <form id="teacher-form" class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Full Name</label>
                    <input type="text" id="teacher-name" required class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-2.5 text-sm outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Specialization</label>
                    <input type="text" id="teacher-dept" required class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-2.5 text-sm outline-none">
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="toggleModal('teacher', false)" class="flex-1 text-sm font-bold text-slate-500">Cancel</button>
                    <button type="submit" class="flex-1 bg-violet-600 text-white py-2.5 rounded-xl text-sm font-bold">Save Teacher</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
            authDomain: "fire-b-a8878.firebaseapp.com",
            databaseURL: "https://fire-b-a8878.firebaseio.com",
            projectId: "fire-b-a8878",
            storageBucket: "fire-b-a8878.firebasestorage.app",
            messagingSenderId: "658673187627",
            appId: "1:658673187627:web:db830dda676c5b4dafa36e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // UI State
        const showLoader = (show) => {
            document.getElementById('global-loader').classList.toggle('hidden', !show);
            document.getElementById('global-loader').classList.toggle('flex', show);
        };

        window.nav = (target) => {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden-section'));
            document.getElementById(`section-${target}`).classList.remove('hidden-section');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`nav-${target}`).classList.add('active');
            document.getElementById('page-title').innerText = target.charAt(0).toUpperCase() + target.slice(1);
        };

        window.toggleModal = (type, show) => {
            document.getElementById('modal-container').classList.toggle('hidden', !show);
            document.getElementById('modal-container').classList.toggle('flex', show);
        };

        // Firebase Listeners
        showLoader(true);

        // Fetch Teachers
        onValue(ref(db, 'teachers'), (snapshot) => {
            const data = snapshot.val() || {};
            const table = document.getElementById('teacher-table-body');
            table.innerHTML = '';
            
            Object.entries(data).forEach(([key, t]) => {
                table.innerHTML += `
                    <tr class="hover:bg-slate-50">
                        <td class="px-6 py-3 font-bold text-slate-700">${t.name}</td>
                        <td class="px-6 py-3 text-slate-500">${t.dept || 'General'}</td>
                        <td class="px-6 py-3 text-slate-400">${t.email || 'n/a'}</td>
                        <td class="px-6 py-3 text-right"><i data-lucide="more-horizontal" class="w-4 h-4 inline opacity-30"></i></td>
                    </tr>
                `;
            });
            document.getElementById('stat-teachers').innerText = Object.keys(data).length;
            lucide.createIcons();
            showLoader(false);
        });

        // Fetch Revenue & Stats
        onValue(ref(db, 'stats/revenue'), (snapshot) => {
            const rev = snapshot.val() || 0;
            document.getElementById('stat-revenue').innerText = `R ${rev.toLocaleString()}`;
        });

        onValue(ref(db, 'learners'), (snapshot) => {
            const count = snapshot.val() ? Object.keys(snapshot.val()).length : 0;
            document.getElementById('stat-learners').innerText = count;
        });

        // Form Handling
        document.getElementById('teacher-form').onsubmit = async (e) => {
            e.preventDefault();
            showLoader(true);
            const newTeacher = {
                name: document.getElementById('teacher-name').value,
                dept: document.getElementById('teacher-dept').value,
                joinedAt: new Date().toISOString()
            };
            try {
                await push(ref(db, 'teachers'), newTeacher);
                toggleModal('teacher', false);
            } catch (err) { console.error(err); }
            showLoader(false);
        };

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
