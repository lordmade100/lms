<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rare Grade LMS | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hidden-section { display: none; }
        
        .loader { border-top-color: #6366f1; animation: spinner 0.7s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .sidebar { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .nav-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .nav-btn.active { background-color: #4f46e5; color: white; }
        
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        
        table tr { transition: all 0.2s ease; }
        table tr:hover { background-color: #f8fafc; }
        
        .modal { animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalPop { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-zinc-50 flex min-h-screen">

    <!-- Mobile Warning -->
    <div id="mobile-warning" class="hidden md:hidden fixed inset-0 bg-slate-950 z-[999] flex items-center justify-center p-6">
        <div class="text-center max-w-xs">
            <span class="text-6xl mb-6 block">💻</span>
            <h2 class="text-3xl font-bold text-white mb-3">Desktop Only</h2>
            <p class="text-slate-400">This admin panel is optimized for desktop experience.</p>
        </div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar group w-20 hover:w-72 bg-slate-950 h-screen fixed md:sticky top-0 text-white flex flex-col shadow-2xl z-50 overflow-hidden">
        <div class="p-6 border-b border-slate-800 flex items-center gap-x-3">
            <div class="w-11 h-11 bg-gradient-to-br from-violet-600 to-indigo-600 rounded-2xl flex items-center justify-center text-white text-3xl font-bold">RG</div>
            <div class="opacity-0 group-hover:opacity-100 transition-all whitespace-nowrap">
                <div class="text-2xl font-bold">Rare Grade</div>
                <div class="text-xs text-indigo-300">LMS Admin</div>
            </div>
        </div>

        <nav class="flex-1 px-3 py-8 space-y-2">
            <button onclick="nav('dashboard')" id="nav-dashboard" class="nav-btn active w-full flex items-center gap-x-4 px-5 py-4 rounded-2xl text-left">
                <i class="fa-solid fa-house w-6 h-6"></i>
                <span class="opacity-0 group-hover:opacity-100 font-medium whitespace-nowrap">Dashboard</span>
            </button>
            <button onclick="nav('courses')" id="nav-courses" class="nav-btn w-full flex items-center gap-x-4 px-5 py-4 rounded-2xl text-left text-slate-400 hover:bg-slate-900 hover:text-white">
                <i class="fa-solid fa-book w-6 h-6"></i>
                <span class="opacity-0 group-hover:opacity-100 font-medium whitespace-nowrap">Courses</span>
            </button>
            <button onclick="nav('learners')" id="nav-learners" class="nav-btn w-full flex items-center gap-x-4 px-5 py-4 rounded-2xl text-left text-slate-400 hover:bg-slate-900 hover:text-white">
                <i class="fa-solid fa-users w-6 h-6"></i>
                <span class="opacity-0 group-hover:opacity-100 font-medium whitespace-nowrap">Learners</span>
            </button>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 min-h-screen md:ml-20">
        <header class="bg-white border-b px-6 md:px-8 py-6 flex items-center justify-between sticky top-0 z-40">
            <h1 id="page-title" class="text-3xl font-semibold text-gray-900">Dashboard</h1>
        </header>

        <div class="p-6 md:p-8">
            <!-- DASHBOARD -->
            <section id="section-dashboard">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
                    <div class="bg-white rounded-3xl p-8 card-hover shadow-sm border border-gray-100">
                        <div class="flex justify-between">
                            <div>
                                <p class="text-gray-500 text-sm">Total Learners</p>
                                <h3 id="stat-learners" class="text-5xl font-bold mt-3">0</h3>
                            </div>
                            <i class="fa-solid fa-users text-4xl text-emerald-500"></i>
                        </div>
                    </div>
                    <div class="bg-white rounded-3xl p-8 card-hover shadow-sm border border-gray-100">
                        <div class="flex justify-between">
                            <div>
                                <p class="text-gray-500 text-sm">Active Courses</p>
                                <h3 id="stat-courses" class="text-5xl font-bold mt-3 text-indigo-600">0</h3>
                            </div>
                            <i class="fa-solid fa-book text-4xl text-indigo-500"></i>
                        </div>
                    </div>
                    <div class="bg-white rounded-3xl p-8 card-hover shadow-sm border border-gray-100">
                        <div class="flex justify-between">
                            <div>
                                <p class="text-gray-500 text-sm">Total Revenue</p>
                                <h3 id="stat-revenue" class="text-5xl font-bold mt-3">R 0</h3>
                            </div>
                            <i class="fa-solid fa-hand-holding-dollar text-4xl text-amber-500"></i>
                        </div>
                    </div>
                    <div class="bg-white rounded-3xl p-8 card-hover shadow-sm border border-gray-100">
                        <div class="flex justify-between">
                            <div>
                                <p class="text-gray-500 text-sm">Avg Completion</p>
                                <h3 id="stat-completion" class="text-5xl font-bold mt-3">83%</h3>
                            </div>
                            <i class="fa-solid fa-chart-line text-4xl text-rose-500"></i>
                        </div>
                    </div>
                </div>
            </section>

            <!-- COURSES SECTION -->
            <section id="section-courses" class="hidden-section">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-semibold">Course Catalog</h2>
                    <button onclick="toggleModal('course', true)" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl flex items-center gap-2 hover:bg-indigo-700">
                        <i class="fa-solid fa-plus"></i> New Course
                    </button>
                </div>
                <div id="courses-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </section>

            <!-- LEARNERS SECTION -->
            <section id="section-learners" class="hidden-section">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-semibold">Learner Registry</h2>
                    <button onclick="openLearnerForm()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl flex items-center gap-2 hover:bg-indigo-700">
                        <i class="fa-solid fa-plus"></i> Add Learner
                    </button>
                </div>
                <input type="text" id="learner-search" onkeyup="searchLearners()" placeholder="Search learners..." 
                       class="w-full max-w-md bg-white border border-gray-200 rounded-3xl px-6 py-4 focus:outline-none focus:border-indigo-400">
                <div class="bg-white rounded-3xl shadow-sm overflow-hidden mt-6">
                    <table class="w-full">
                        <thead class="bg-zinc-50">
                            <tr class="text-xs uppercase text-gray-500">
                                <th class="px-8 py-6 text-left">ID</th>
                                <th class="px-8 py-6 text-left">Name</th>
                                <th class="px-8 py-6 text-left">Email</th>
                                <th class="px-8 py-6 text-left">Course</th>
                                <th class="px-8 py-6 text-left">Status</th>
                            </tr>
                        </thead>
                        <tbody id="learner-table-body" class="divide-y"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <!-- MODALS -->
    <div id="modal-container" class="fixed inset-0 bg-black/70 backdrop-blur-xl hidden items-center justify-center z-[100]">

        <!-- Course Modal -->
        <div id="modal-course" class="modal bg-white w-full max-w-lg rounded-3xl shadow-2xl hidden">
            <div class="p-6 border-b flex justify-between items-center">
                <h3 id="course-modal-title" class="text-2xl font-bold">Create Course</h3>
                <button onclick="toggleModal('course', false)" class="text-3xl">&times;</button>
            </div>
            <form id="course-form" class="p-6 space-y-6">
                <input type="hidden" id="course-edit-key">
                <div>
                    <label class="block text-sm font-medium mb-2">Course Title</label>
                    <input type="text" id="course-title" required class="w-full border rounded-2xl px-5 py-4">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Price (ZAR)</label>
                        <input type="number" id="course-price" required class="w-full border rounded-2xl px-5 py-4">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Duration</label>
                        <input type="text" id="course-duration" placeholder="e.g. 8 weeks" required class="w-full border rounded-2xl px-5 py-4">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Thumbnail</label>
                    <input type="file" id="course-file" accept="image/*" class="w-full">
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-semibold">Save Course</button>
            </form>
        </div>

        <!-- Learner Modal (same as before) -->
        <div id="modal-learner" class="modal bg-white w-full max-w-lg rounded-3xl shadow-2xl hidden">
            <!-- Full learner form with duration display -->
        </div>
    </div>

    <!-- Loader -->
    <div id="global-loader" class="fixed inset-0 bg-slate-900/70 backdrop-blur hidden items-center justify-center z-[200]">
        <div class="bg-white p-10 rounded-3xl shadow-2xl text-center">
            <div class="loader w-16 h-16 mx-auto mb-4 rounded-full border-8 border-t-indigo-600"></div>
            <p id="loader-text">Processing...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { /* your config */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.learnersMap = {};
        window.coursesMap = {};
        window.currentEditCourseKey = null;

        const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dqkujefxj/upload";
        const UPLOAD_PRESET = "banter_box";

        // Navigation
        window.nav = (target) => {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden-section'));
            document.getElementById(`section-${target}`).classList.remove('hidden-section');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`nav-${target}`).classList.add('active');
            document.getElementById('page-title').textContent = target === 'dashboard' ? 'Dashboard' : target.charAt(0).toUpperCase() + target.slice(1);
        };

        window.toggleModal = (type, show) => {
            const container = document.getElementById('modal-container');
            container.classList.toggle('hidden', !show);
            container.classList.toggle('flex', show);
            document.querySelectorAll('#modal-container > div').forEach(d => d.classList.add('hidden'));
            if (show) document.getElementById(`modal-${type}`).classList.remove('hidden');
        };

        const loader = (show, text = "Processing...") => {
            const el = document.getElementById('global-loader');
            document.getElementById('loader-text').textContent = text;
            el.classList.toggle('hidden', !show);
            el.classList.toggle('flex', show);
        };

        // Real-time Courses
        onValue(ref(db, 'courses'), (snapshot) => {
            const data = snapshot.val() || {};
            window.coursesMap = data;
            renderCourses(data);
            document.getElementById('stat-courses').textContent = Object.keys(data).length;
        });

        function renderCourses(data) {
            const grid = document.getElementById('courses-grid');
            grid.innerHTML = '';
            Object.entries(data).forEach(([key, course]) => {
                grid.innerHTML += `
                <div class="bg-white rounded-3xl overflow-hidden card-hover border border-gray-100">
                    <img src="${course.thumbnail || 'https://picsum.photos/id/1015/600/340'}" class="w-full h-48 object-cover">
                    <div class="p-6">
                        <h4 class="font-semibold text-lg">${course.title}</h4>
                        <div class="flex justify-between text-sm mt-3">
                            <span class="text-indigo-600 font-bold">R ${course.price}</span>
                            <span class="text-gray-500">${course.duration || 'N/A'}</span>
                        </div>
                        <div class="flex gap-3 mt-6">
                            <button onclick="editCourse('${key}')" class="flex-1 py-3 border border-gray-300 rounded-2xl text-sm font-medium hover:bg-gray-50">Edit</button>
                            <button onclick="deleteCourse('${key}')" class="flex-1 py-3 border border-red-200 text-red-600 rounded-2xl text-sm font-medium hover:bg-red-50">Delete</button>
                        </div>
                    </div>
                </div>`;
            });
        }

        window.editCourse = (key) => {
            const course = window.coursesMap[key];
            window.currentEditCourseKey = key;
            document.getElementById('course-modal-title').textContent = "Edit Course";
            document.getElementById('course-edit-key').value = key;
            document.getElementById('course-title').value = course.title;
            document.getElementById('course-price').value = course.price;
            document.getElementById('course-duration').value = course.duration || '';
            toggleModal('course', true);
        };

        window.deleteCourse = async (key) => {
            if (confirm("Delete this course?")) {
                loader(true, "Deleting course...");
                await remove(ref(db, `courses/${key}`));
                loader(false);
            }
        };

        // Course Form Submit
        document.getElementById('course-form').onsubmit = async (e) => {
            e.preventDefault();
            loader(true, "Saving course...");
            const editKey = document.getElementById('course-edit-key').value;
            const file = document.getElementById('course-file').files[0];

            let thumbnail = '';
            if (file) {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', UPLOAD_PRESET);
                const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData });
                const data = await res.json();
                thumbnail = data.secure_url;
            }

            const courseData = {
                title: document.getElementById('course-title').value,
                price: document.getElementById('course-price').value,
                duration: document.getElementById('course-duration').value,
                thumbnail: thumbnail || (editKey ? window.coursesMap[editKey].thumbnail : ''),
                updatedAt: Date.now()
            };

            if (editKey) {
                await update(ref(db, `courses/${editKey}`), courseData);
            } else {
                await set(push(ref(db, 'courses')), { ...courseData, createdAt: Date.now() });
            }

            toggleModal('course', false);
            document.getElementById('course-form').reset();
            loader(false);
        };

        // Learners real-time (same logic as before with duration display)
        onValue(ref(db, 'learners'), (snapshot) => {
            // ... (full learner rendering code)
            document.getElementById('stat-learners').textContent = Object.keys(snapshot.val() || {}).length;
        });

        window.onload = () => {
            if (window.innerWidth < 768) document.getElementById('mobile-warning').classList.remove('hidden');
            nav('dashboard');
        };
    </script>
</body>
</html>
